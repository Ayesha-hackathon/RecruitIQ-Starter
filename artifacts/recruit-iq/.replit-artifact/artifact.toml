kind = "web"
previewPath = "/"
title = "RecruitIQ AI"
version = "1.0.0"
id = "artifacts/recruit-iq"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22600

[services.env]
PORT = "22600"
BASE_PATH = "/"

[services.development]
run = "pnpm --filter @workspace/recruit-iq run dev"

[services.production]
publicDir = "artifacts/recruit-iq/dist/public"
serve = "static"

[services.production.build]
args = ["sh", "-c", "PORT=8080 BASE_PATH=/ pnpm --filter @workspace/recruit-iq run build"]

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
